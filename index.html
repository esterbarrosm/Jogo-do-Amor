<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jogo do Amor - 10 Dates para se Conectar</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #F9F6F0;       /* Warm Cream */
            --card-bg: #FFFFFF;        
            --text-primary: #2C2623;   
            --text-secondary: #7A6F68; 
            --accent-gold: #D4AF37;    
            --accent-rose: #E0A899;    
            --btn-hover: #C59B27;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        .divider {
            width: 40px;
            height: 2px;
            background-color: var(--accent-rose);
            margin: 0.5rem auto;
            border-radius: 2px;
        }

        .game-container {
            width: 100%;
            max-width: 400px;
            perspective: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background-color: var(--card-bg);
            width: 100%;
            height: 430px;
            border-radius: 24px;
            padding: 2.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            position: relative;
            cursor: pointer;
            box-shadow: 
                0 4px 6px -1px rgba(0, 0, 0, 0.05),
                0 10px 15px -3px rgba(0, 0, 0, 0.03),
                0 20px 25px -5px rgba(0, 0, 0, 0.02);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), 
                        box-shadow 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        @media (hover: hover) {
            .card:hover {
                transform: translateY(-4px) scale(1.01);
                box-shadow: 
                    0 10px 20px -5px rgba(44, 38, 35, 0.08),
                    0 20px 30px -10px rgba(44, 38, 35, 0.04);
            }
        }

        .card-tag {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            padding: 6px 16px;
            border-radius: 50px;
            margin-bottom: 1rem;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .card-content {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            line-height: 1.5;
            font-style: italic;
            color: var(--text-primary);
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-footer {
            font-size: 0.7rem;
            color: var(--text-secondary);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 1rem;
        }

        .counter {
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        /* Container para os botões secundários secundários */
        .control-panel {
            display: flex;
            gap: 24px;
            margin-bottom: 1.5rem;
        }

        .btn-secondary {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s ease, opacity 0.2s ease;
        }

        .btn-secondary:hover {
            color: var(--text-primary);
        }

        .btn-secondary:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .btn-next {
            background-color: var(--accent-gold);
            color: #FFFFFF;
            border: none;
            padding: 1rem 2.5rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            border-radius: 50px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            box-shadow: 0 4px 10px rgba(212, 175, 55, 0.2);
        }

        .btn-next:hover { background-color: var(--btn-hover); }
        .btn-next:active { transform: scale(0.98); }

        /* Classes de Animação */
        .swipe-out { animation: swipeOutLeft 0.35s forwards cubic-bezier(0.4, 0, 0.2, 1); }
        .swipe-in { animation: swipeInRight 0.35s forwards cubic-bezier(0.4, 0, 1, 1); }
        .swipe-out-reverse { animation: swipeOutRight 0.35s forwards cubic-bezier(0.4, 0, 0.2, 1); }
        .swipe-in-reverse { animation: swipeInLeft 0.35s forwards cubic-bezier(0.4, 0, 1, 1); }

        @keyframes swipeOutLeft {
            0% { transform: translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateX(-120%) rotate(-10deg); opacity: 0; }
        }
        @keyframes swipeInRight {
            0% { transform: translateX(120%) rotate(10deg); opacity: 0; }
            100% { transform: translateX(0) rotate(0deg); opacity: 1; }
        }
        @keyframes swipeOutRight {
            0% { transform: translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateX(120%) rotate(10deg); opacity: 0; }
        }
        @keyframes swipeInLeft {
            0% { transform: translateX(-120%) rotate(-10deg); opacity: 0; }
            100% { transform: translateX(0) rotate(0deg); opacity: 1; }
        }
    </style>
</head>

            { tema: "NOSSA HISTÓRIA", num: "07", txt: "Se pudéssemos extrair uma lição valiosa de nossa história, qual você diria?" },
            { tema: "NOSSA HISTÓRIA", num: "08", txt: "Se você pudesse escolher qualquer lugar do mundo para me levar, qual seria e por quê?" },
            { tema: "NOSSA HISTÓRIA", num: "09", txt: "Quais são as coisas que a gente precisa prometer nunca fazer um com o outro?" }
        ];

        // Histórico para permitir a função "Voltar"
        let historicoDeCartas = [];
        let perguntasDisponiveis = [...cartasDePerguntas];
        let cartaAtual = null;
        let animationControl = false;

        const cardElement = document.getElementById('card');
        const tagElement = document.getElementById('card-tag');
        const textElement = document.getElementById('card-text');
        const numberElement = document.getElementById('card-number');
        const counterElement = document.getElementById('counter');
        const btnBackElement = document.getElementById('btn-back');

        function aplicarEstiloTema(tema) {
            const config = temasConfig[tema] || { bg: "#F5F5F5", texto: "#2C2623" };
            tagElement.style.backgroundColor = config.bg;
            tagElement.style.color = config.texto;
        }

        function atualizarRenderizacaoCard(carta) {
            tagElement.innerText = carta.tema;
            textElement.innerText = carta.txt;
            numberElement.innerText = `Pergunta ${carta.num}`;
            aplicarEstiloTema(carta.tema);
            counterElement.innerText = `Cartas visualizadas: ${historicoDeCartas.length + 1} / ${cartasDePerguntas.length}`;
            
            // Ativa/Desativa botão voltar
            btnBackElement.disabled = historicoDeCartas.length === 0;
        }

        function sortearPergunta() {
            if (perguntasDisponiveis.length === 0) {
                // Se esgotar, reinicia mantendo o histórico limpo para o novo ciclo
                perguntasDisponiveis = [...cartasDePerguntas];
            }

            let indiceSorteado;
            let novaCarta;

            do {
                indiceSorteado = Math.floor(Math.random() * perguntasDisponiveis.length);
                novaCarta = perguntasDisponiveis[indiceSorteado];
            } while (novaCarta === cartaAtual && cartasDePerguntas.length > 1);

            perguntasDisponiveis.splice(indiceSorteado, 1);
            return novaCarta;
        }

        function proximaPergunta() {
            if (animationControl) return;
            animationControl = true;

            // Remove classes antigas
            cardElement.className = "card";
            void cardElement.offsetWidth; // Força reflow do CSS

            // Anima saindo para a esquerda
            cardElement.classList.add('swipe-out');

            setTimeout(() => {
                // Salva a carta atual no histórico antes de mudar
                if (cartaAtual) {
                    historicoDeCartas.push(cartaAtual);
                }

                cartaAtual = sortearPergunta();
                atualizarRenderizacaoCard(cartaAtual);

                // Entra pela direita
                cardElement.classList.remove('swipe-out');
                cardElement.classList.add('swipe-in');
            }, 300);

            setTimeout(() => { animationControl = false; }, 650);
        }

        function voltarPergunta() {
            if (animationControl || historicoDeCartas.length === 0) return;
            animationControl = true;

            cardElement.className = "card";
            void cardElement.offsetWidth;

            // Animação reversa: sai para a direita
            cardElement.classList.add('swipe-out-reverse');

            setTimeout(() => {
                // Devolve a carta atual para a pilha de disponíveis
                if (cartaAtual) {
                    perguntasDisponiveis.push(cartaAtual);
                }

                // Recupera a anterior do histórico
                const cartaAnterior = historicoDeCartas.pop();
                
                // Remove ela das disponíveis para não re-sortear imediatamente
                const idx = perguntasDisponiveis.indexOf(cartaAnterior);
                if (idx > -1) perguntasDisponiveis.splice(idx, 1);

                cartaAtual = cartaAnterior;
                atualizarRenderizacaoCard(cartaAtual);

                // Entra pela esquerda
                cardElement.classList.remove('swipe-out-reverse');
                cardElement.classList.add('swipe-in-reverse');
            }, 300);

            setTimeout(() => { animationControl = false; }, 650);
        }

        function zerarJogo() {
            if (!confirm("Deseja mesmo zerar o jogo e reembaralhar todas as cartas?")) return;
            
            historicoDeCartas = [];
            perguntasDisponiveis = [...cartasDePerguntas];
            cartaAtual = sortearPergunta();
            
            cardElement.className = "card";
            void cardElement.offsetWidth;
            cardElement.classList.add('swipe-in');
            
            atualizarRenderizacaoCard(cartaAtual);
        }

        // Configuração Inicial
        cartaAtual = sortearPergunta();
        atualizarRenderizacaoCard(cartaAtual);
    </script>
</body>
</html>
